{% extends "base.html" %}
{% block body %}
{% include "partials/sidebar_admin.html" %}

<div class="lg:pl-72 min-h-screen flex flex-col">
  <header class="sticky top-0 z-30 h-16 bg-paper-100/80 dark:bg-charcoal-950/80 backdrop-blur-lg border-b border-charcoal-100 dark:border-charcoal-800 flex items-center justify-between px-5 sm:px-8 shrink-0">
    <div class="flex items-center gap-3">
      <button data-sidebar-open aria-label="Open sidebar" class="lg:hidden w-9 h-9 flex items-center justify-center rounded-full hover:bg-charcoal-100 dark:hover:bg-charcoal-800">
        <i data-lucide="menu" class="w-5 h-5"></i>
      </button>
      <h1 class="font-display font-semibold text-lg sm:text-xl">{% block dashboard_title %}Admin{% endblock %}</h1>
    </div>
    <button data-theme-toggle aria-label="Toggle dark mode" class="w-9 h-9 rounded-full flex items-center justify-center text-charcoal-500 hover:bg-charcoal-100 dark:text-charcoal-300 dark:hover:bg-charcoal-800 transition-colors">
      <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
      <i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i>
    </button>
  </header>

  <main class="flex-1 px-5 sm:px-8 py-8 max-w-7xl w-full mx-auto">
    {% block dashboard_content %}{% endblock %}
  </main>
</div>
{% endblock %}
