<div data-sidebar-close class="hidden fixed inset-0 z-40 bg-charcoal-950/50 backdrop-blur-sm lg:hidden"></div>

<aside data-sidebar class="fixed inset-y-0 left-0 z-50 w-72 -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-out bg-white dark:bg-charcoal-900 border-r border-charcoal-100 dark:border-charcoal-800 flex flex-col">
  <div class="flex items-center justify-between h-16 px-6 border-b border-charcoal-100 dark:border-charcoal-800 shrink-0">
    <a href="{{ url_for('main.landing') }}" class="flex items-center gap-2">
      <span class="w-8 h-8 rounded-lg bg-charcoal-900 dark:bg-emerald-500 flex items-center justify-center">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 dark:bg-charcoal-950"></span>
      </span>
      <span class="font-display font-semibold text-lg">{{ app_name }} <span class="text-xs font-normal text-charcoal-400">Business</span></span>
    </a>
    <button data-sidebar-close aria-label="Close sidebar" class="lg:hidden w-8 h-8 flex items-center justify-center rounded-full hover:bg-charcoal-100 dark:hover:bg-charcoal-800">
      <i data-lucide="x" class="w-4 h-4"></i>
    </button>
  </div>

  <nav class="flex-1 overflow-y-auto p-4 space-y-1">
    <a href="{{ url_for('business.dashboard') }}" class="{{ 'sidebar-link-active' if active == 'overview' else 'sidebar-link' }}">
      <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
    </a>
    <a href="{{ url_for('business.bulk_delivery') }}" class="{{ 'sidebar-link-active' if active == 'bulk' else 'sidebar-link' }}">
      <i data-lucide="package-plus" class="w-4 h-4"></i> Bulk delivery
    </a>
    <a href="{{ url_for('business.deliveries') }}" class="{{ 'sidebar-link-active' if active == 'deliveries' else 'sidebar-link' }}">
      <i data-lucide="package" class="w-4 h-4"></i> Delivery history
    </a>
    <a href="{{ url_for('business.invoices') }}" class="{{ 'sidebar-link-active' if active == 'invoices' else 'sidebar-link' }}">
      <i data-lucide="file-text" class="w-4 h-4"></i> Invoices
    </a>
    <a href="{{ url_for('business.reports') }}" class="{{ 'sidebar-link-active' if active == 'reports' else 'sidebar-link' }}">
      <i data-lucide="bar-chart-3" class="w-4 h-4"></i> Reports
    </a>
    <a href="{{ url_for('dashboard.wallet') }}" class="sidebar-link">
      <i data-lucide="wallet" class="w-4 h-4"></i> Wallet
    </a>
  </nav>

  <div class="p-4 border-t border-charcoal-100 dark:border-charcoal-800 shrink-0">
    <div class="flex items-center gap-3 rounded-xl p-2 hover:bg-charcoal-100 dark:hover:bg-charcoal-800 transition-colors">
      <div class="w-9 h-9 rounded-full bg-emerald-500 text-charcoal-950 font-display font-semibold text-sm flex items-center justify-center shrink-0">
        {{ current_user.full_name[:2]|upper }}
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-sm font-medium truncate">{{ current_user.business_profile.company_name if current_user.business_profile else current_user.full_name }}</p>
        <p class="text-xs text-charcoal-400 truncate">{{ current_user.email }}</p>
      </div>
      <a href="{{ url_for('auth.logout') }}" aria-label="Log out" class="w-8 h-8 flex items-center justify-center rounded-full text-charcoal-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/20">
        <i data-lucide="log-out" class="w-4 h-4"></i>
      </a>
    </div>
  </div>
</aside>
