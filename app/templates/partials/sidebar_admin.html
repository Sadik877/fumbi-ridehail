<div data-sidebar-close class="hidden fixed inset-0 z-40 bg-charcoal-950/50 backdrop-blur-sm lg:hidden"></div>

<aside data-sidebar class="fixed inset-y-0 left-0 z-50 w-72 -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-out bg-charcoal-950 text-white flex flex-col">
  <div class="flex items-center justify-between h-16 px-6 border-b border-charcoal-800 shrink-0">
    <a href="{{ url_for('main.landing') }}" class="flex items-center gap-2">
      <span class="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center">
        <span class="w-1.5 h-1.5 rounded-full bg-charcoal-950"></span>
      </span>
      <span class="font-display font-semibold text-lg">{{ app_name }} <span class="text-xs font-normal text-charcoal-400">Admin</span></span>
    </a>
    <button data-sidebar-close aria-label="Close sidebar" class="lg:hidden w-8 h-8 flex items-center justify-center rounded-full hover:bg-charcoal-800">
      <i data-lucide="x" class="w-4 h-4"></i>
    </button>
  </div>

  <nav class="flex-1 overflow-y-auto p-4 space-y-1 text-sm">
    <a href="{{ url_for('admin.dashboard') }}" class="flex items-center gap-3 rounded-xl px-3.5 py-2.5 font-medium {{ 'bg-emerald-500 text-charcoal-950' if active == 'overview' else 'text-charcoal-300 hover:bg-charcoal-800 hover:text-white' }}">
      <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Overview
    </a>
    <a href="{{ url_for('admin.users') }}" class="flex items-center gap-3 rounded-xl px-3.5 py-2.5 font-medium {{ 'bg-emerald-500 text-charcoal-950' if active == 'users' else 'text-charcoal-300 hover:bg-charcoal-800 hover:text-white' }}">
      <i data-lucide="users" class="w-4 h-4"></i> Users
    </a>
    <a href="{{ url_for('admin.drivers') }}" class="flex items-center gap-3 rounded-xl px-3.5 py-2.5 font-medium {{ 'bg-emerald-500 text-charcoal-950' if active == 'drivers' else 'text-charcoal-300 hover:bg-charcoal-800 hover:text-white' }}">
      <i data-lucide="car" class="w-4 h-4"></i> Drivers
    </a>
    <a href="{{ url_for('admin.bookings') }}" class="flex items-center gap-3 rounded-xl px-3.5 py-2.5 font-medium {{ 'bg-emerald-500 text-charcoal-950' if active == 'bookings' else 'text-charcoal-300 hover:bg-charcoal-800 hover:text-white' }}">
      <i data-lucide="clipboard-list" class="w-4 h-4"></i> Bookings
    </a>
    <a href="{{ url_for('admin.payments') }}" class="flex items-center gap-3 rounded-xl px-3.5 py-2.5 font-medium {{ 'bg-emerald-500 text-charcoal-950' if active == 'payments' else 'text-charcoal-300 hover:bg-charcoal-800 hover:text-white' }}">
      <i data-lucide="credit-card" class="w-4 h-4"></i> Payments
    </a>
    <a href="{{ url_for('admin.support') }}" class="flex items-center gap-3 rounded-xl px-3.5 py-2.5 font-medium {{ 'bg-emerald-500 text-charcoal-950' if active == 'support' else 'text-charcoal-300 hover:bg-charcoal-800 hover:text-white' }}">
      <i data-lucide="life-buoy" class="w-4 h-4"></i> Support
    </a>
    <a href="{{ url_for('admin.coupons') }}" class="flex items-center gap-3 rounded-xl px-3.5 py-2.5 font-medium {{ 'bg-emerald-500 text-charcoal-950' if active == 'coupons' else 'text-charcoal-300 hover:bg-charcoal-800 hover:text-white' }}">
      <i data-lucide="ticket" class="w-4 h-4"></i> Coupons
    </a>
  </nav>

  <div class="p-4 border-t border-charcoal-800 shrink-0">
    <div class="flex items-center gap-3 rounded-xl p-2 hover:bg-charcoal-800 transition-colors">
      <div class="w-9 h-9 rounded-full bg-emerald-500 text-charcoal-950 font-display font-semibold text-sm flex items-center justify-center shrink-0">
        {{ current_user.full_name[:2]|upper }}
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-sm font-medium truncate text-white">{{ current_user.full_name }}</p>
        <p class="text-xs text-charcoal-400 truncate">{{ current_user.email }}</p>
      </div>
      <a href="{{ url_for('auth.logout') }}" aria-label="Log out" class="w-8 h-8 flex items-center justify-center rounded-full text-charcoal-400 hover:text-rose-400 hover:bg-rose-900/20">
        <i data-lucide="log-out" class="w-4 h-4"></i>
      </a>
    </div>
  </div>
</aside>
