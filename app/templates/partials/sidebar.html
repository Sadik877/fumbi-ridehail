<!-- Mobile overlay backdrop for sidebar -->
<div data-sidebar-close class="hidden fixed inset-0 z-40 bg-ink-950/50 backdrop-blur-sm lg:hidden"></div>

<aside data-sidebar class="fixed inset-y-0 left-0 z-50 w-72 -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-out bg-white dark:bg-ink-900 border-r border-ink-100 dark:border-ink-800 flex flex-col">
  <div class="flex items-center justify-between h-16 px-6 border-b border-ink-100 dark:border-ink-800 shrink-0">
    <a href="{{ url_for('main.landing') }}" class="flex items-center gap-2">
      <span class="w-8 h-8 rounded-lg bg-ink-900 dark:bg-canopy-500 flex items-center justify-center">
        <span class="w-1.5 h-1.5 rounded-full bg-canopy-400 dark:bg-ink-950"></span>
      </span>
      <span class="font-display font-semibold text-lg">{{ app_name }}</span>
    </a>
    <button data-sidebar-close aria-label="Close sidebar" class="lg:hidden w-8 h-8 flex items-center justify-center rounded-full hover:bg-ink-100 dark:hover:bg-ink-800">
      <i data-lucide="x" class="w-4 h-4"></i>
    </button>
  </div>

  <nav class="flex-1 overflow-y-auto p-4 space-y-1">
    <p class="px-3.5 text-[11px] font-semibold uppercase tracking-wide text-ink-400 mb-2 mt-2">Overview</p>
    <a href="{{ url_for('dashboard.index') }}" class="{{ 'sidebar-link-active' if active == 'overview' else 'sidebar-link' }}">
      <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
    </a>
    <a href="{{ url_for('booking.history') }}" class="{{ 'sidebar-link-active' if active == 'history' else 'sidebar-link' }}">
      <i data-lucide="history" class="w-4 h-4"></i> Booking history
    </a>

    <p class="px-3.5 text-[11px] font-semibold uppercase tracking-wide text-ink-400 mb-2 mt-6">Book</p>
    <a href="{{ url_for('booking.ride') }}" class="sidebar-link">
      <i data-lucide="car" class="w-4 h-4"></i> Book a ride
    </a>
    <a href="{{ url_for('booking.delivery') }}" class="sidebar-link">
      <i data-lucide="package" class="w-4 h-4"></i> Send a delivery
    </a>

    <p class="px-3.5 text-[11px] font-semibold uppercase tracking-wide text-ink-400 mb-2 mt-6">Account</p>
    <a href="{{ url_for('dashboard.wallet') }}" class="{{ 'sidebar-link-active' if active == 'wallet' else 'sidebar-link' }}">
      <i data-lucide="wallet" class="w-4 h-4"></i> Wallet
    </a>
    <a href="{{ url_for('dashboard.notifications') }}" class="{{ 'sidebar-link-active' if active == 'notifications' else 'sidebar-link' }}">
      <i data-lucide="bell" class="w-4 h-4"></i> Notifications
      <span class="ml-auto badge-success">3</span>
    </a>
    <a href="{{ url_for('dashboard.profile') }}" class="{{ 'sidebar-link-active' if active == 'profile' else 'sidebar-link' }}">
      <i data-lucide="user" class="w-4 h-4"></i> Profile
    </a>
  </nav>

  <div class="p-4 border-t border-ink-100 dark:border-ink-800 shrink-0">
    <div class="flex items-center gap-3 rounded-xl p-2 hover:bg-ink-100 dark:hover:bg-ink-800 transition-colors cursor-pointer">
      <div class="w-9 h-9 rounded-full bg-canopy-500 text-ink-950 font-display font-semibold text-sm flex items-center justify-center shrink-0">
        {{ user.avatar_initials }}
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-sm font-medium truncate">{{ user.name }}</p>
        <p class="text-xs text-ink-400 truncate">{{ user.email }}</p>
      </div>
      <a href="{{ url_for('auth.logout') }}" aria-label="Log out" class="w-8 h-8 flex items-center justify-center rounded-full text-ink-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/20">
        <i data-lucide="log-out" class="w-4 h-4"></i>
      </a>
    </div>
  </div>
</aside>
