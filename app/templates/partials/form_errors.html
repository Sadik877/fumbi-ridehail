{% if form and form.errors %}
<div class="rounded-xl bg-rose-50 dark:bg-rose-900/20 border border-rose-200 dark:border-rose-800 p-4 mb-5">
  <p class="text-sm font-medium text-rose-700 dark:text-rose-300 mb-1">Please fix the following:</p>
  <ul class="text-sm text-rose-600 dark:text-rose-400 list-disc list-inside space-y-0.5">
    {% for field_name, errors in form.errors.items() %}
      {% for error in errors %}
      <li>{{ error }}</li>
      {% endfor %}
    {% endfor %}
  </ul>
</div>
{% endif %}
