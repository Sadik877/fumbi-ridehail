{% extends "base.html" %}
{% block title %}Set a new password — {{ app_name }}{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-sm">
    <div class="flex items-center gap-2 mb-10 justify-center">
      <span class="w-8 h-8 rounded-lg bg-charcoal-900 dark:bg-emerald-500 flex items-center justify-center">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 dark:bg-charcoal-950"></span>
      </span>
      <span class="font-display font-semibold text-lg">{{ app_name }}</span>
    </div>

    <h2 class="font-display text-2xl font-semibold mb-1 text-center">Set a new password</h2>
    <p class="text-sm text-charcoal-500 dark:text-charcoal-400 mb-8 text-center">Choose something you haven't used before.</p>

    {% include "partials/form_errors.html" %}
    <form method="POST" class="card p-6 space-y-4">
      {{ form.csrf_token }}
      <div>
        <label class="label" for="password">New password</label>
        <input id="password" name="password" type="password" required class="input" placeholder="At least 8 characters">
      </div>
      <div>
        <label class="label" for="confirm_password">Confirm new password</label>
        <input id="confirm_password" name="confirm_password" type="password" required class="input" placeholder="Re-enter your new password">
      </div>
      <button type="submit" class="btn-primary w-full !py-3.5">Update password <i data-lucide="arrow-right" class="w-4 h-4"></i></button>
    </form>
  </div>
</div>
{% endblock %}
