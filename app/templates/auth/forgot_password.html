{% extends "base.html" %}
{% block title %}Reset your password — {{ app_name }}{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-sm">
    <div class="flex items-center gap-2 mb-10 justify-center">
      <span class="w-8 h-8 rounded-lg bg-charcoal-900 dark:bg-emerald-500 flex items-center justify-center">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 dark:bg-charcoal-950"></span>
      </span>
      <span class="font-display font-semibold text-lg">{{ app_name }}</span>
    </div>

    <h2 class="font-display text-2xl font-semibold mb-1 text-center">Forgot your password?</h2>
    <p class="text-sm text-charcoal-500 dark:text-charcoal-400 mb-8 text-center">Enter your email and we'll send you a reset link.</p>

    {% include "partials/form_errors.html" %}
    <form method="POST" class="card p-6 space-y-4">
      {{ form.csrf_token }}
      <div>
        <label class="label" for="email">Email</label>
        <input id="email" name="email" type="email" required class="input" placeholder="you@example.com">
      </div>
      <button type="submit" class="btn-primary w-full !py-3.5">Send reset link <i data-lucide="arrow-right" class="w-4 h-4"></i></button>
    </form>

    <p class="text-xs text-charcoal-400 mt-6 text-center">
      <a href="{{ url_for('auth.login') }}" class="text-emerald-600 dark:text-emerald-400 font-medium hover:underline">Back to log in</a>
    </p>
  </div>
</div>
{% endblock %}
